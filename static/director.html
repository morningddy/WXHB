// ============ 截图 ============
async function takeScreenshot() {
    showToast('正在截图...');
    try {
        // 截图前隐藏相机可视化对象（不在画面中显示）
        cameraObjects.forEach(c => c.visible = false);

        const w = currentRes.w;
        const h = currentRes.h;

        // 保存当前大小
        const oldSize = new THREE.Vector2();
        renderer.getSize(oldSize);
        const oldPixelRatio = renderer.getPixelRatio();

        // 设置高分辨率渲染
        renderer.setPixelRatio(1);
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.render(scene, camera);
        // 恢复相机可视化对象（不在截图中显示）
        cameraObjects.forEach(c => c.visible = true);

        // 获取 dataURL 通过 postMessage 传回画布（iframe 通信）
        const dataURL = renderer.domElement.toDataURL('image/png');
        if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'screenshot', data: dataURL }, '*');
        }

        // 从 canvas 获取 blob 用于上传保存
        renderer.domElement.toBlob(async (blob) => {
            // 恢复原始大小
            renderer.setPixelRatio(oldPixelRatio);
            renderer.setSize(oldSize.x, oldSize.y, false);
            camera.aspect = oldSize.x / oldSize.y;
            camera.updateProjectionMatrix();
            renderer.render(scene, camera);

            if (blob) {
                await uploadFile(blob, 'screenshot', 'png');
                showToast('截图已保存并发送到画布');
            } else {
                showToast('截图失败');
            }
        }, 'image/png');
    } catch (e) {
        // 出错也要恢复相机可视化对象
        cameraObjects.forEach(c => c.visible = true);
        console.error('截图错误:', e);
        showToast('截图失败: ' + e.message);
    }
}

// ============ 录制 ============
async function toggleRecording() {
    if (isRecording) {
        stopRecording();
    } else {
        startRecording();
    }
}

async function startRecording() {
    try {
        const stream = renderer.domElement.captureStream(30);
        mediaRecorder = new MediaRecorder(stream, { mimeType:'video/webm;codecs=vp9' });
        recordedChunks = [];
        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) recordedChunks.push(e.data);
        };
        mediaRecorder.onstop = async () => {
            const blob = new Blob(recordedChunks, { type:'video/webm' });
            // 通过 postMessage 传回画布（iframe 通信）
            if (window.parent && window.parent !== window) {
                try {
                    const arrayBuffer = await blob.arrayBuffer();
                    window.parent.postMessage({
                        type: 'video',
                        data: arrayBuffer,
                        width: currentRes.w,
                        height: currentRes.h
                    }, '*');
                } catch (err) {
                    console.warn('postMessage 视频传输失败:', err);
                }
            }
            await uploadFile(blob, 'recording', 'webm');
            showToast('录制完成，已发送到画布');
        };
        mediaRecorder.start(100);
        isRecording = true;
        document.getElementById('rec-dot').style.display = 'block';
        document.getElementById('btn-record').classList.add('active');
        showToast('开始录制...');
    } catch (e) {
        console.error('录制错误:', e);
        showToast('录制失败: ' + e.message);
    }
}

function stopRecording() {
    if (mediaRecorder) mediaRecorder.stop();
    isRecording = false;
    document.getElementById('rec-dot').style.display = 'none';
    document.getElementById('btn-record').classList.remove('active');
}

// ============ 上传背景图 ============
function uploadBgImage() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = () => {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const tex = new THREE.Texture(img);
                tex.needsUpdate = true;
                tex.minFilter = THREE.LinearFilter;
                tex.magFilter = THREE.LinearFilter;
                scene.background = tex;
                showToast('背景图已设置: ' + file.name);
            };
            img.onerror = () => showToast('背景图解码失败');
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    };
    input.click();
}

// ============ 上传3D模型 ============
function uploadModel() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.glb,.gltf,.obj,.mtl';
    input.onchange = () => {
        const file = input.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        showToast('正在加载模型: ' + file.name);

        if (file.name.endsWith('.glb') || file.name.endsWith('.gltf')) {
            const loader = new THREE.GLTFLoader();
            loader.load(url, (gltf) => {
                const obj = gltf.scene;
                obj.name = file.name.replace(/\.[^.]+$/, '');
                obj.userData = { type: 'model', id: Date.now() };
                obj.traverse(c => { if(c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
                scene.add(obj);
                objects.push(obj);
                updateObjectTree();
                selectObject(obj);
                showToast('GLTF 模型已加载: ' + obj.name);
                URL.revokeObjectURL(url);
            }, undefined, (err) => {
                showToast('GLTF 加载失败: ' + err);
                URL.revokeObjectURL(url);
            });
        } else if (file.name.endsWith('.obj')) {
            // 尝试找同名的 .mtl 文件
            const baseName = file.name.replace(/\.obj$/i, '');
            const mtlInput = document.createElement('input');
            mtlInput.type = 'file';
            mtlInput.accept = '.mtl';
            mtlInput.onchange = () => {
                const mtlFile = mtlInput.files[0];
                if (mtlFile) {
                    const mtlUrl = URL.createObjectURL(mtlFile);
                    const mtlLoader = new THREE.MTLLoader();
                    mtlLoader.load(mtlUrl, (materials) => {
                        materials.preload();
                        const objLoader = new THREE.OBJLoader();
                        objLoader.setMaterials(materials);
                        objLoader.load(url, (obj) => {
                            obj.traverse(c => { if(c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
                            obj.name = file.name.replace(/\.obj$/i, '');
                            obj.userData = { type: 'model', id: Date.now() };
                            scene.add(obj);
                            objects.push(obj);
                            updateObjectTree();
                            selectObject(obj);
                            showToast('OBJ+MTL 模型已加载: ' + file.name);
                            URL.revokeObjectURL(url);
                            URL.revokeObjectURL(mtlUrl);
                        }, undefined, (err) => {
                            showToast('OBJ 加载失败: ' + err);
                            URL.revokeObjectURL(url);
                        });
                    }, undefined, () => {
                        // MTL 加载失败，继续加载 OBJ
                        const objLoader = new THREE.OBJLoader();
                        objLoader.load(url, (obj) => {
                            obj.traverse(c => { if(c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
                            obj.name = file.name.replace(/\.obj$/i, '');
                            obj.userData = { type: 'model', id: Date.now() };
                            scene.add(obj);
                            objects.push(obj);
                            updateObjectTree();
                            selectObject(obj);
                            showToast('OBJ 模型已加载（无材质）: ' + file.name);
                            URL.revokeObjectURL(url);
                        });
                    });
                } else {
                    // 没有 MTL，直接加载 OBJ
                    const objLoader = new THREE.OBJLoader();
                    objLoader.load(url, (obj) => {
                        scene.add(obj);
                        objects.push({ name: file.name, obj: obj });
                        updateObjectTree();
                        showToast('OBJ 模型已加载（无材质）: ' + file.name);
                        URL.revokeObjectURL(url);
                    }, undefined, (err) => {
                        showToast('OBJ 加载失败: ' + err);
                        URL.revokeObjectURL(url);
                    });
                }
            };
            mtlInput.click();
        }
    };
    input.click();
}

// ============ 文件上传到后端 ============
async function uploadFile(blob, kind, ext) {
    const formData = new FormData();
    formData.append('file', blob, `director_${kind}_${Date.now()}.${ext}`);
    formData.append('type', kind);
    try {
        const res = await fetch('/api/director/upload', { method:'POST', body:formData });
        const data = await res.json();
        if (data.ok) {
            // 通过 WebSocket 通知画布（如果已连接）
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type:'director_output', url:data.url, kind }));
            }
            return data.url;
        }
    } catch (e) {
        console.error('上传错误:', e);
        showToast('上传失败，请确认服务已启动');
    }
}

// ============ WebSocket ============
let ws = null;
function setupWebSocket() {
    try {
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/ws/stats`);
        ws.onopen = () => console.log('[导演台] WebSocket 已连接');
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'canvas_updated') {
                showToast('画布已更新');
            }
        };
        ws.onerror = (e) => console.warn('WebSocket 错误', e);
    } catch (e) { 
        console.warn('WebSocket 连接失败', e); 
    }
}

// ============ 工程管理 ============
function addProject() {
    const name = prompt('输入工程名称：', '新场景_' + (document.querySelectorAll('.project-item').length + 1));
    if (!name) return;
    const list = document.getElementById('project-list');
    const div = document.createElement('div');
    div.className = 'project-item';
    div.innerHTML = `<span class="project-icon">🎬</span><span class="project-name">${name}</span>`;
    div.onclick = () => switchProject(div, document.querySelectorAll('.project-item').length - 1);
    list.appendChild(div);
    div.click();
    showToast('已创建工程: ' + name);
}

function switchProject(el, idx) {
    document.querySelectorAll('.project-item').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    // 简化：只清空当前场景
    clearScene();
    addObject('cube');
    showToast('已切换到工程 ' + (idx + 1));
}

function saveProject() {
    const data = {
        objects: objects.map(o => ({
            name: o.name,
            type: o.userData.type,
            position: [o.position.x, o.position.y, o.position.z],
            rotation: [o.rotation.x, o.rotation.y, o.rotation.z],
            scale: [o.scale.x, o.scale.y, o.scale.z],
        })),
        camera: { x:camera.position.x, y:camera.position.y, z:camera.position.z },
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'director_project.json'; a.click();
    URL.revokeObjectURL(url);
    showToast('工程已保存');
}

// ============ UI 辅助 ============
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

function toggleAddMenu(e) {
    const menu = document.getElementById('add-menu');
    if (menu.classList.contains('show')) { 
        menu.classList.remove('show'); 
        return; 
    }
    const rect = e.currentTarget.getBoundingClientRect();
    menu.style.top = rect.bottom + 4 + 'px';
    menu.style.left = rect.left + 'px';
    menu.classList.add('show');
}

function selectRes(el) {
    const w = parseInt(el.dataset.w), h = parseInt(el.dataset.h);
    currentRes = { w, h };
    document.querySelectorAll('.res-opt').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    const menu = document.getElementById('res-selector');
    menu.classList.remove('show');
    showToast(`分辨率: ${w}x${h}`);
}

function toggleResMenu() {
    const menu = document.getElementById('res-selector');
    menu.classList.toggle('show');
}

// 点击空白关闭菜单
document.addEventListener('click', (e) => {
    if (!e.target.closest('.add-menu') && !e.target.closest('[onclick*="toggleAddMenu"]')) {
        document.getElementById('add-menu').classList.remove('show');
    }
    if (!e.target.closest('.res-selector') && !e.target.closest('#btn-res')) {
        document.getElementById('res-selector').classList.remove('show');
    }
});

// ============ 画布点击选中 ============
function onCanvasClick(e) {
    const rect = renderer.domElement.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(x, y), camera);
    // 合并 objects 和 cameraObjects 一起检测
    const allObjs = [...objects, ...cameraObjects];
    const hits = ray.intersectObjects(allObjs, true);
    if (hits.length > 0) {
        let obj = hits[0].object;
        // 找到可选中的节点：allObjs 中的对象 / 人形部位 / 聚光target点
        while (obj.parent) {
            if (allObjs.includes(obj)) break;
            if (obj.userData && (obj.userData.isHumanPart || obj.userData.isHumanJoint)) break;
            if (obj.userData && obj.userData.isSpotLightTarget) break;
            obj = obj.parent;
        }
        if (allObjs.includes(obj) || (obj.userData && (obj.userData.isHumanPart || obj.userData.isHumanJoint || obj.userData.isSpotLightTarget))) {
            selectObject(obj);
        }
    }
    // 点空白处不再取消选中，避免属性面板消失
    // 如需取消选中，按 Escape 键
}

function onKeyDown(e) {
    if (e.key === 'Delete' || e.key === 'Backspace') {
        if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
            deleteSelected();
        }
    }
    if (e.key === 'Escape') {
        if (selectedObj) {
            selectObject(null);
            showToast('已取消选中');
        }
        // 关闭所有弹出菜单
        document.getElementById('add-menu').classList.remove('show');
        document.getElementById('res-selector').classList.remove('show');
    }
}

// ============ 拖放 GLB/GLTF ============
function setupDragDrop() {
    const overlay = document.getElementById('drop-overlay');
    const wrap = document.querySelector('.viewport-wrap');
    wrap.addEventListener('dragover', (e) => { e.preventDefault(); overlay.classList.add('show'); });
    wrap.addEventListener('dragleave', () => overlay.classList.remove('show'));
    wrap.addEventListener('drop', (e) => {
        e.preventDefault();
        overlay.classList.remove('show');
        const file = e.dataTransfer.files[0];
        if (file && (file.name.endsWith('.glb') || file.name.endsWith('.gltf'))) {
            loadGLTF(file);
        } else {
            showToast('请拖入 .glb 或 .gltf 文件');
        }
    });
}

function loadGLTF(file) {
    showToast('正在加载模型: ' + file.name);
    const url = URL.createObjectURL(file);
    const loader = new THREE.GLTFLoader();
    loader.load(url, (gltf) => {
        const obj = gltf.scene;
        obj.name = file.name.replace(/\.[^.]+$/, '');
        obj.castShadow = true;
        obj.traverse(c => { if(c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
        scene.add(obj);
        objects.push(obj);
        updateObjectTree();
        selectObject(obj);
        showToast('模型已加载: ' + obj.name);
        URL.revokeObjectURL(url);
    }, undefined, (e) => { 
        showToast('模型加载失败'); 
        console.error('GLTF 加载错误:', e); 
    });
}
