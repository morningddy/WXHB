<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导演台 - Director Stage</title>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --panel-border: #1e1e2a;
    --card: #181822;
    --hover: #1e1e2e;
    --active: #2a2a3e;
    --text: #e8e8f0;
    --muted: #7878a0;
    --accent: #6c5ce7;
    --accent-glow: rgba(108,92,231,.25);
    --danger: #ff6b6b;
    --success: #51cf66;
    --warn: #ffd43b;
    --grid: rgba(108,92,231,.08);
    --divider: #1e1e2e;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 4px 20px rgba(0,0,0,.4);
}
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Inter',system-ui,-apple-system,sans-serif; }

/* 布局 */
.app { display:flex; width:100%; height:100vh; }

/* 左侧面板 */
.left-panel {
    width:240px; min-width:240px; background:var(--panel);
    border-right:1px solid var(--panel-border); display:flex; flex-direction:column;
    z-index:10; user-select:none;
}
.panel-header {
    height:44px; display:flex; align-items:center; justify-content:space-between;
    padding:0 12px; border-bottom:1px solid var(--divider); flex-shrink:0;
}
.panel-title { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
.panel-actions { display:flex; gap:4px; }
.panel-btn {
    width:28px; height:28px; border-radius:var(--radius-sm); background:transparent; border:1px solid transparent;
    color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:14px; transition:all .15s;
}
.panel-btn:hover { background:var(--hover); color:var(--text); border-color:var(--divider); }

/* 工程列表 */
.project-section { padding:8px; flex-shrink:0; }
.section-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; padding:4px 8px; }
.project-item {
    display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:var(--radius-sm);
    cursor:pointer; transition:background .12s; font-size:12.5px; color:var(--text);
}
.project-item:hover { background:var(--hover); }
.project-item.active { background:var(--accent); color:#fff; }
.project-icon { font-size:15px; flex-shrink:0; }
.project-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.project-del { opacity:0; width:20px; height:20px; border-radius:4px; border:none; background:transparent; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:12px; transition:all .15s; }
.project-item:hover .project-del { opacity:1; }
.project-del:hover { background:rgba(255,107,107,.15); color:var(--danger); }

/* 对象树 */
.object-tree { flex:1; overflow-y:auto; padding:4px 8px 8px; }
.tree-item {
    display:flex; align-items:center; gap:6px; padding:5px 8px; border-radius:var(--radius-sm);
    cursor:pointer; font-size:12px; color:var(--text); transition:background .12s;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.tree-item:hover { background:var(--hover); }
.tree-item.selected { background:var(--accent); color:#fff; }
.tree-item.indent-1 { padding-left:22px; }
.tree-item.indent-2 { padding-left:36px; }
.tree-icon { font-size:13px; flex-shrink:0; width:18px; text-align:center; }
/* 展开/折叠箭头 */
.tree-expand {
    width:16px; height:16px; border-radius:3px; border:none; background:transparent;
    color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:10px; flex-shrink:0; transition:transform .15s;
    margin-right:2px;
}
.tree-expand:hover { background:rgba(255,255,255,.08); color:var(--text); }
.tree-expand.collapsed { transform:rotate(-90deg); }
.tree-children { }
.tree-children.collapsed { display:none; }
.tree-visibility {
    margin-left:auto; opacity:0; width:20px; height:20px; border-radius:4px; border:none;
    background:transparent; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:11px; transition:all .15s; flex-shrink:0;
}
.tree-item:hover .tree-visibility { opacity:1; }
.tree-visibility:hover { background:rgba(255,255,255,.08); }
.tree-visibility.hidden { color:var(--danger); opacity:1; }

/* 3D 视口 */
.viewport-wrap { flex:1; position:relative; overflow:hidden; background:#050508; }
#viewport { width:100%; height:100%; display:block; }
.viewport-overlay {
    position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:2;
}
.viewport-info {
    position:absolute; top:10px; right:12px; pointer-events:auto; z-index:3;
    display:flex; gap:6px;
}
.viewport-badge {
    padding:3px 9px; border-radius:999px; background:rgba(10,10,15,.75); border:1px solid var(--divider);
    backdrop-filter:blur(8px); font-size:10px; font-weight:700; color:var(--muted); letter-spacing:.03em;
}

/* 顶部工具栏 */
.top-bar {
    position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:5; pointer-events:auto;
    display:flex; align-items:center; gap:4px; padding:4px 6px; border-radius:12px;
    background:rgba(18,18,26,.88); border:1px solid var(--panel-border);
    backdrop-filter:blur(12px); box-shadow:var(--shadow);
}
.top-btn {
    height:34px; padding:0 12px; border-radius:8px; border:1px solid transparent;
    background:transparent; color:var(--text); cursor:pointer; font-size:11.5px; font-weight:700;
    display:flex; align-items:center; gap:5px; transition:all .15s; white-space:nowrap;
}
.top-btn:hover { background:var(--hover); border-color:var(--divider); }
.top-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.top-btn.danger { color:var(--danger); }
.top-btn.danger:hover { background:rgba(255,107,107,.12); }
.top-sep { width:1px; height:20px; background:var(--divider); margin:0 2px; flex-shrink:0; }
.top-icon { font-size:14px; }

/* 底部工具栏 */
.bottom-bar {
    position:absolute; bottom:14px; left:50%; transform:translateX(-50%); z-index:5; pointer-events:auto;
    display:flex; align-items:center; gap:4px; padding:5px 8px; border-radius:14px;
    background:rgba(18,18,26,.88); border:1px solid var(--panel-border);
    backdrop-filter:blur(12px); box-shadow:var(--shadow);
}
.bottom-btn {
    width:36px; height:36px; border-radius:9px; border:1px solid transparent;
    background:transparent; color:var(--muted); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:15px;
    transition:all .15s; position:relative;
}
.bottom-btn:hover { background:var(--hover); color:var(--text); border-color:var(--divider); }
.bottom-btn.active { color:var(--accent); border-color:rgba(108,92,231,.3); background:var(--accent-glow); }
/* 变换模式按钮高亮：移动=红，旋转=绿，缩放=蓝 */
.bottom-btn.translate-active { color:#ff4444 !important; border-color:rgba(255,68,68,.4); background:rgba(255,68,68,.12); }
.bottom-btn.rotate-active { color:#44ff44 !important; border-color:rgba(68,255,68,.4); background:rgba(68,255,68,.12); }
.bottom-btn.scale-active { color:#4488ff !important; border-color:rgba(68,136,255,.4); background:rgba(68,136,255,.12); }
.bottom-sep { width:1px; height:22px; background:var(--divider); margin:0 2px; flex-shrink:0; }
.bottom-label { font-size:9px; font-weight:700; color:var(--muted); letter-spacing:.04em; }

/* 录制指示灯 */
.rec-dot {
    position:absolute; top:5px; right:5px; width:7px; height:7px;
    border-radius:50%; background:var(--danger); animation:recBlink 1s ease-in-out infinite;
}
@keyframes recBlink { 0%,100%{opacity:1;} 50%{opacity:.2;} }

/* 右侧属性面板 */
.right-panel {
    width:220px; min-width:220px; background:var(--panel);
    border-left:1px solid var(--panel-border); display:flex; flex-direction:column;
    z-index:10; overflow-y:auto;
}
.prop-group { padding:10px 12px; border-bottom:1px solid var(--divider); }
.prop-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
.prop-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.prop-row:last-child { margin-bottom:0; }
.prop-input {
    flex:1; height:28px; border-radius:var(--radius-sm); border:1px solid var(--divider);
    background:var(--card); color:var(--text); padding:0 8px; font-size:11.5px; outline:none;
    transition:border-color .15s;
}
.prop-input:focus { border-color:var(--accent); }
.prop-slider {
    flex:1; height:4px; -webkit-appearance:none; appearance:none; border-radius:2px;
    background:var(--divider); outline:none; cursor:pointer;
}
.prop-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:14px; height:14px; border-radius:50%;
    background:var(--accent); border:2px solid var(--bg); cursor:pointer;
}
.prop-value { font-size:10px; font-weight:700; color:var(--muted); min-width:32px; text-align:right; }

/* 灯光参数面板 */
.prop-color {
    width:24px; height:24px; border-radius:4px; border:1px solid var(--divider);
    background:transparent; cursor:pointer; padding:0;
}
.prop-checkbox { width:16px; height:16px; cursor:pointer; }

/* 相机预览 PIP */
.camera-pip {
    position:absolute; bottom:60px; right:16px; width:240px; height:135px;
    border:2px solid var(--accent); border-radius:8px; overflow:hidden;
    background:#000; z-index:50; box-shadow:0 4px 20px rgba(0,0,0,.6);
    display:none;
}
.camera-pip.show { display:block; }
.camera-pip canvas { width:100%; height:100%; }
.camera-pip-label {
    position:absolute; top:4px; left:6px; font-size:9px; font-weight:700;
    color:#fff; background:rgba(0,0,0,.55); padding:2px 6px; border-radius:4px;
    pointer-events:none;
}

/* 拖放覆盖层 */
.drop-overlay {
    position:fixed; inset:0; z-index:1000; background:rgba(108,92,231,.12);
    border:3px dashed var(--accent); display:none; align-items:center; justify-content:center;
    pointer-events:none;
}
.drop-overlay.show { display:flex; }
.drop-msg { font-size:18px; font-weight:800; color:var(--accent); text-shadow:0 0 20px var(--accent-glow); }

/* 提示条 */
.toast {
    position:fixed; bottom:70px; left:50%; transform:translateX(-50%); z-index:9999;
    padding:8px 18px; border-radius:10px; background:var(--card); border:1px solid var(--divider);
    color:var(--text); font-size:12px; font-weight:700; box-shadow:var(--shadow);
    opacity:0; transition:opacity .3s; pointer-events:none;
}
.toast.show { opacity:1; }

/* 分辨率选择器 */
.res-selector {
    position:absolute; bottom:58px; left:50%; transform:translateX(-50%); z-index:6;
    padding:6px; border-radius:10px; background:var(--panel); border:1px solid var(--panel-border);
    box-shadow:var(--shadow); display:none; gap:4px;
}
.res-selector.show { display:flex; }
.res-opt {
    padding:5px 12px; border-radius:7px; border:1px solid transparent; background:transparent;
    color:var(--muted); cursor:pointer; font-size:11px; font-weight:700; transition:all .15s;
}
.res-opt:hover { background:var(--hover); color:var(--text); }
.res-opt.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* 滚动条 */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--divider); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--muted); }

/* 添加物体菜单 */
.add-menu {
    position:absolute; z-index:20; padding:4px; border-radius:10px;
    background:var(--panel); border:1px solid var(--panel-border);
    box-shadow:0 8px 30px rgba(0,0,0,.5); display:none;
}
.add-menu.show { display:block; }
.add-item {
    display:flex; align-items:center; gap:8px; padding:7px 14px; border-radius:7px;
    cursor:pointer; font-size:12px; color:var(--text); transition:background .12s; white-space:nowrap;
}
.add-item:hover { background:var(--hover); }
.add-item-icon { font-size:15px; width:22px; text-align:center; flex-shrink:0; }
</style>
</head>
<body>

<div class="app">
    <!-- 左侧面板 -->
    <aside class="left-panel">
        <div class="panel-header">
            <span class="panel-title">工程</span>
            <div class="panel-actions">
                <button class="panel-btn" onclick="addProject()" title="新建工程">＋</button>
            </div>
        </div>
        <div class="project-section" id="project-list">
            <div class="project-item active" onclick="switchProject(this,0)">
                <span class="project-icon">🎬</span>
                <span class="project-name">默认场景</span>
            </div>
        </div>
        <div class="panel-header">
            <span class="panel-title">场景对象</span>
            <div class="panel-actions">
                <button class="panel-btn" onclick="toggleAddMenu(event)" title="添加对象">＋</button>
            </div>
        </div>
        <div class="object-tree" id="object-tree"></div>
        <div class="panel-actions" style="padding:6px 8px;display:flex;gap:4px;flex-shrink:0;">
            <button class="panel-btn" onclick="uploadBgImage()" title="上传背景图" style="flex:1;font-size:11px;">🖼️ Bg</button>
            <button class="panel-btn" onclick="uploadModel()" title="上传3D模型" style="flex:1;font-size:11px;">📦 Model</button>
        </div>
    </aside>

    <!-- 3D 视口 -->
    <div class="viewport-wrap">
        <canvas id="viewport"></canvas>
        <div class="viewport-overlay"></div>
        <div class="viewport-info">
            <span class="viewport-badge" id="fps-badge">-- FPS</span>
            <span class="viewport-badge" id="obj-badge">0 对象</span>
            <span class="viewport-badge" id="lock-badge" style="display:none; color:var(--accent); border-color:var(--accent);">🔒 锁定</span>
        </div>

        <!-- 顶部工具栏 -->
        <div class="top-bar">
            <button class="top-btn" onclick="saveProject()" title="保存工程">
                <span class="top-icon">💾</span> 保存
            </button>
            <div class="top-sep"></div>
            <button class="top-btn active" id="btn-3dmode" onclick="toggle2D()" title="3D/2D 切换">
                <span class="top-icon">🎥</span> 3D
            </button>
            <div class="top-sep"></div>
            <button class="top-btn" onclick="resetCamera()" title="重置相机">
                <span class="top-icon">🎯</span> 复位
            </button>
            <button class="top-btn" onclick="toggleGrid()" id="btn-grid" title="网格开关">
                <span class="top-icon">⊞</span> 网格
            </button>
            <div class="top-sep"></div>
            <button class="top-btn danger" onclick="clearScene()" title="清空场景">
                <span class="top-icon">🗑️</span> 清空
            </button>
        </div>

        <!-- 底部工具栏 -->
        <div class="bottom-bar">
            <button class="bottom-btn" onclick="setView('front')" title="前视图">⬆</button>
            <button class="bottom-btn" onclick="setView('top')" title="顶视图">⬇</button>
            <button class="bottom-btn" onclick="setView('left')" title="左视图">⬅</button>
            <button class="bottom-btn" onclick="setView('persp')" title="透视图">🔄</button>
            <div class="bottom-sep"></div>
            <button class="bottom-btn" id="btn-light" onclick="toggleLight()" title="灯光开关">💡</button>
            <div class="bottom-sep"></div>
            <button class="bottom-btn" id="btn-translate" onclick="setTransformMode('translate')" title="移动 (W)">⟶</button>
            <button class="bottom-btn" id="btn-rotate" onclick="setTransformMode('rotate')" title="旋转 (E)">⟳</button>
            <button class="bottom-btn" id="btn-scale" onclick="setTransformMode('scale')" title="缩放 (R)">⟷</button>
            <div class="bottom-sep"></div>
            <button class="bottom-btn" id="btn-screenshot" onclick="takeScreenshot()" title="截图">📷</button>
            <button class="bottom-btn" id="btn-record" onclick="toggleRecording()" title="录制视频">
                ⏺
                <span class="rec-dot" id="rec-dot" style="display:none"></span>
            </button>
            <div class="bottom-sep"></div>
            <button class="bottom-btn" id="btn-res" onclick="toggleResMenu()" title="分辨率">📐</button>
        </div>

        <!-- 相机预览 PIP -->
        <div class="camera-pip" id="camera-pip">
            <div class="camera-pip-label" id="pip-label">相机预览</div>
            <canvas id="pip-canvas"></canvas>
        </div>

        <!-- 分辨率选择器 -->
        <div class="res-selector" id="res-selector">
            <button class="res-opt" data-w="1920" data-h="1080" onclick="selectRes(this)">1080P</button>
            <button class="res-opt active" data-w="3840" data-h="2160" onclick="selectRes(this)">4K</button>
            <button class="res-opt" data-w="7680" data-h="4320" onclick="selectRes(this)">8K</button>
        </div>
    </div>

    <!-- 右侧属性面板 -->
    <aside class="right-panel">
        <div class="panel-header">
            <span class="panel-title">属性</span>
        </div>
        <div id="props-content">
            <!-- 未选中提示 -->
            <div id="props-overlay" style="display:none; padding:20px 12px; font-size:11px; color:var(--muted); text-align:center;">
                选中对象以编辑属性
            </div>

            <!-- 默认面板：全局控制 + 普通对象变换 -->
            <div id="props-default">
                <div class="prop-group">
                    <div class="prop-label">相机</div>
                    <div class="prop-row">
                        <span class="bottom-label" style="width:50px">FOV</span>
                        <input type="range" class="prop-slider" id="slider-fov" min="20" max="120" value="50" oninput="updateFOV(this.value)">
                        <span class="prop-value" id="val-fov">50°</span>
                    </div>
                    <div class="prop-row">
                        <span class="bottom-label" style="width:50px">距离</span>
                        <input type="range" class="prop-slider" id="slider-dist" min="1" max="50" value="10" oninput="updateDist(this.value)">
                        <span class="prop-value" id="val-dist">10</span>
                    </div>
                </div>
                <div class="prop-group" id="transform-group">
                    <div class="prop-label">变换</div>
                    <div class="prop-row">
                        <span class="bottom-label" style="width:14px">X</span>
                        <input type="number" class="prop-input" id="inp-px" value="0" step="0.1" oninput="updateTransform()">
                        <span class="bottom-label" style="width:14px">Y</span>
                        <input type="number" class="prop-input" id="inp-py" value="0" step="0.1" oninput="updateTransform()">
                        <span class="bottom-label" style="width:14px">Z</span>
                        <input type="number" class="prop-input" id="inp-pz" value="0" step="0.1" oninput="updateTransform()">
                    </div>
                    <div id="rot-rows">
                        <div class="prop-row">
                            <span class="bottom-label" style="width:28px">旋转</span>
                            <input type="number" class="prop-input" id="inp-rx" value="0" step="1" oninput="updateTransform()">
                            <input type="number" class="prop-input" id="inp-ry" value="0" step="1" oninput="updateTransform()">
                            <input type="number" class="prop-input" id="inp-rz" value="0" step="1" oninput="updateTransform()">
                        </div>
                    </div>
                    <div id="scale-rows">
                        <div class="prop-row">
                            <span class="bottom-label" style="width:28px">缩放</span>
                            <input type="number" class="prop-input" id="inp-sx" value="1" step="0.1" min="0.01" oninput="updateTransform()">
                            <input type="number" class="prop-input" id="inp-sy" value="1" step="0.1" min="0.01" oninput="updateTransform()">
                            <input type="number" class="prop-input" id="inp-sz" value="1" step="0.1" min="0.01" oninput="updateTransform()">
                        </div>
                    </div>
                    <div class="prop-row" id="mesh-color-row">
                        <label class="prop-label" style="width:28px">颜色</label>
                        <input type="color" class="prop-color" id="mesh-color" value="#6c5ce7" oninput="applyMeshColor()">
                    </div>
                </div>
                <div class="prop-group">
                    <div class="prop-label">场景灯光</div>
                    <div class="prop-row">
                        <label class="prop-label" style="width:50px">环境光</label>
                        <input type="range" class="prop-slider" id="slider-ambient" min="0" max="100" value="40" oninput="updateAmbient(this.value)">
                        <span class="prop-value" id="val-ambient">40%</span>
                    </div>
                    <div class="prop-row">
                        <label class="prop-label" style="width:50px">方向光</label>
                        <input type="range" class="prop-slider" id="slider-dir" min="0" max="200" value="120" oninput="updateDirLight(this.value)">
                        <span class="prop-value" id="val-dir">1.2</span>
                    </div>
                    <div class="prop-row">
                        <label class="prop-label" style="width:50px">补光</label>
                        <input type="range" class="prop-slider" id="slider-fill" min="0" max="100" value="30" oninput="updateFillLight(this.value)">
                        <span class="prop-value" id="val-fill">0.3</span>
                    </div>
                    <div class="prop-row">
                        <label class="prop-label" style="width:50px">色温</label>
                        <input type="color" class="prop-color" id="light-color" value="#fff5e6" onchange="updateLightColor(this.value)" title="方向光颜色">
                    </div>
                    <div class="prop-row">
                        <label class="prop-label" style="width:50px">阴影</label>
                        <input type="checkbox" class="prop-checkbox" id="chk-shadow" checked onchange="toggleShadow(this.checked)" title="投射阴影">

<script src="/static/js/three.min.js"></script>
<script src="/static/js/OrbitControls.js"></script>

<script>
// ============ 全局状态 ============
let scene, camera, renderer, controls;
let objects = [];          // 场景对象列表
let selectedObj = null;    // 当前选中对象
let gridVisible = true;
let lightVisible = true;
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];
let currentRes = { w: 3840, h: 2160 };
let animFrameId = null;
let lastTime = 0;
let frameCount = 0;
let fps = 0;
let ambientLight = null;
// 变换控件
let transformControl = null;
let transformMode = 'translate';  // translate | rotate | scale
let cameraObjects = [];       // 场景中的相机对象列表
let lockedCamera = null;      // 锁定到视图的相机对象（Blender 的 Camera to View）
let treeExpandedState = {};   // 对象树展开/折叠状态 { uuid: true/false }

// ============ 网格纹理生成 ============
function createGridTexture() {
    // 生成 512x512 的网格纹理，用于地面
    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 512;
    const ctx = canvas.getContext('2d');

    // 深色底色
    ctx.fillStyle = '#08080f';
    ctx.fillRect(0, 0, 512, 512);

    // 主网格线（大格）
    ctx.strokeStyle = 'rgba(108,92,231,0.25)';
    ctx.lineWidth = 1;
    const bigStep = 64;  // 512/8 = 64，8x8 大格
    for (let x = 0; x <= 512; x += bigStep) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 512); ctx.stroke();
    }
    for (let y = 0; y <= 512; y += bigStep) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(512, y); ctx.stroke();
    }

    // 细网格线（小格）
    ctx.strokeStyle = 'rgba(108,92,231,0.10)';
    ctx.lineWidth = 0.5;
    const smallStep = 8;
    for (let x = 0; x <= 512; x += smallStep) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 512); ctx.stroke();
    }
    for (let y = 0; y <= 512; y += smallStep) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(512, y); ctx.stroke();
    }

    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(5, 5);  // 40x40 地面，每格 8 单位
    tex.magFilter = THREE.NearestFilter;
    tex.minFilter = THREE.LinearMipmapLinearFilter;
    return tex;
}

// ============ 初始化 Three.js ============
function init() {
    console.log('[导演台] 开始初始化...');
    const canvas = document.getElementById('viewport');
    const wrap = canvas.parentElement;

    // 渲染器
    renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    // 场景
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050508);
    scene.fog = new THREE.FogExp2(0x050508, 0.015);

    // 相机
    camera = new THREE.PerspectiveCamera(50, wrap.clientWidth / wrap.clientHeight, 0.1, 1000);
    camera.position.set(10, 8, 10);

    // 控制器
    controls = new THREE.OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);
    controls.update();

    // 锁定相机到视图：OrbitControls 操作后同步到锁定相机
    controls.addEventListener('change', () => {
        if (lockedCamera) {
            lockedCamera.position.copy(camera.position);
            lockedCamera.quaternion.copy(camera.quaternion);
        }
    });

    // 灯光
    ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    ambientLight.name = 'ambient_light';
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
    dirLight.position.set(8, 12, 6);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.name = 'main_light';
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0xc8d6ff, 0.3);
    fillLight.position.set(-5, 4, -3);
    fillLight.name = 'fill_light';
    scene.add(fillLight);

    // 网格地面
    const gridHelper = new THREE.GridHelper(40, 40, 0x1a1a2e, 0x12121e);
    gridHelper.name = 'grid';
    scene.add(gridHelper);

    // 网格地面（接收阴影，带网格纹理）
    const groundGeo = new THREE.PlaneGeometry(40, 40);
    const groundTex = createGridTexture();
    const groundMat = new THREE.MeshStandardMaterial({
        map: groundTex,
        roughness:0.9,
        metalness:0.1,
        transparent: true,
        opacity: 0.85
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    ground.name = 'ground';
    scene.add(ground);

    // 坐标轴辅助
    const axesHelper = new THREE.AxesHelper(3);
    axesHelper.name = 'axes';
    scene.add(axesHelper);

    // 变换控件（Blender 风格 Gizmo）
    transformControl = new THREE.TransformControls(camera, renderer.domElement);
    transformControl.setMode(transformMode);
    transformControl.addEventListener('objectChange', () => {
        if (selectedObj) updatePropsFromObject();
    });
    transformControl.addEventListener('mouseDown', () => controls.enabled = false);
    transformControl.addEventListener('mouseUp', () => controls.enabled = true);
    scene.add(transformControl);
    // 默认不贴附任何对象
    transformControl.detach();

    // 相机预览 PIP
    initPip();

    // 事件
    window.addEventListener('resize', onResize);
    canvas.addEventListener('click', onCanvasClick);
    document.addEventListener('keydown', onKeyDown);

    // 拖放支持
    setupDragDrop();

    // WebSocket 连接（通知画布）
    setupWebSocket();

    // 初始对象
    addObject('cube');  // 默认添加一个立方体

    // 初始化变换模式（默认：移动）
    setTransformMode('translate');

    // 动画循环
    animate();

    updateObjectTree();
    console.log('[导演台] 初始化完成');
}

// ============ 动画循环 ============
function animate(time) {
    animFrameId = requestAnimationFrame(animate);
    controls.update();

    // FPS 计算
    frameCount++;
    if (time - lastTime >= 1000) {
        fps = frameCount;
        frameCount = 0;
        lastTime = time;
        document.getElementById('fps-badge').textContent = fps + ' FPS';
    }

    // 相机预览 PIP
    updateCameraPreview();

    // 更新锁定状态指示
    const lockBadge = document.getElementById('lock-badge');
    if (lockBadge) {
        if (lockedCamera) {
            lockBadge.style.display = 'inline';
            lockBadge.textContent = '🔒 ' + (lockedCamera.name || '相机');
        } else {
            lockBadge.style.display = 'none';
        }
    }

    // 如果锁定了相机，按锁定相机的参数显示画面
    if (lockedCamera) {
        const d = lockedCamera.userData;
        if (camera.fov !== d.fov || camera.near !== d.near || camera.far !== d.far) {
            camera.fov = d.fov;
            camera.near = d.near;
            camera.far = d.far;
            camera.updateProjectionMatrix();
        }
    }

    // 更新聚光灯 targetLine 位置（target被拖拽时实时跟随）
    objects.forEach(obj => {
        if (obj.userData.lightType === 'spot' && obj.userData.spotGizmo) {
            const targetDot = obj.userData.spotGizmo.getObjectByName('SpotLightTarget');
            const targetLine = obj.userData.spotGizmo.getObjectByName('SpotLightTargetLine');
            if (targetDot && targetLine && targetLine.geometry) {
                const pos = targetLine.geometry.attributes.position;
                if (pos) {
                    pos.array[3] = targetDot.position.x;
                    pos.array[4] = targetDot.position.y;
                    pos.array[5] = targetDot.position.z;
                    pos.needsUpdate = true;
                }
            }
        }
    });

    renderer.render(scene, camera);
}

function onResize() {
    const wrap = document.querySelector('.viewport-wrap');
    camera.aspect = wrap.clientWidth / wrap.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
}

// ============ 对象管理 ============
function addObject(type) {
    let mesh, name;
    const colors = [0x6c5ce7, 0x00cec9, 0xfd79a8, 0xffeaa7, 0x55efc4, 0xfab1a0];
    const color = colors[objects.length % colors.length];

    switch(type) {
        case 'cube': {
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshStandardMaterial({ color, roughness:0.5, metalness:0.3 });
            mesh = new THREE.Mesh(geo, mat);
            mesh.name = '立方体_' + (objects.length + 1);
            break;
        }
        case 'sphere': {
            const geo = new THREE.SphereGeometry(0.5, 32, 32);
            const mat = new THREE.MeshStandardMaterial({ color, roughness:0.3, metalness:0.6 });
            mesh = new THREE.Mesh(geo, mat);
            mesh.name = '球体_' + (objects.length + 1);
            break;
        }
        case 'cylinder': {
            const geo = new THREE.CylinderGeometry(0.3, 0.3, 1, 32);
            const mat = new THREE.MeshStandardMaterial({ color, roughness:0.4, metalness:0.4 });
            mesh = new THREE.Mesh(geo, mat);
            mesh.name = '圆柱_' + (objects.length + 1);
            break;
        }
        case 'plane': {
            const geo = new THREE.PlaneGeometry(2, 2);
            const mat = new THREE.MeshStandardMaterial({ color, roughness:0.8, side:THREE.DoubleSide });
            mesh = new THREE.Mesh(geo, mat);
            mesh.name = '平面_' + (objects.length + 1);
            break;
        }
        case 'light': {
            const geo = new THREE.SphereGeometry(0.15, 16, 16);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffaa });
            mesh = new THREE.Mesh(geo, mat);
            mesh.name = '灯光_' + (objects.length + 1);
            mesh.castShadow = false;
            mesh.receiveShadow = false;
            // 默认创建点光源
            const light = new THREE.PointLight(0xfff5e6, 1, 20);
            light.castShadow = true;
            mesh.add(light);
            mesh.userData.lightSource = light;
            mesh.userData.lightType = 'point';
            // 聚光辅助线框容器（spot类型时填充）
            mesh.userData.spotGizmo = null;
            break;
        }
        case 'character': {
            // ===== 层级绑定人形角色（参考截图风格：球头+蓝身+白关节环）=====
            const human = new THREE.Group();
            const bodyColor = 0x7aa4c8;   // 浅蓝色躯干/四肢
            const headColor = 0xf0f0f0;   // 白色头部
            const jointColor = 0xffffff;  // 白色关节
            const bodyMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.5, metalness: 0.1 });
            const headMat = new THREE.MeshStandardMaterial({ color: headColor, roughness: 0.3, metalness: 0.1 });
            const jointMat = new THREE.MeshStandardMaterial({ color: jointColor, roughness: 0.4, metalness: 0.3 });

            function makePart(name, geo, mat, pos, parent) {
                const mesh = new THREE.Mesh(geo, mat);
                mesh.name = name;
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                if (pos) mesh.position.set(pos.x || 0, pos.y || 0, pos.z || 0);
                mesh.userData.isHumanPart = true;
                if (parent) parent.add(mesh);
                return mesh;
            }
            function makeJoint(name, pos, parent) {
                const joint = new THREE.Object3D();
                joint.name = name;
                if (pos) joint.position.set(pos.x || 0, pos.y || 0, pos.z || 0);
                joint.userData.isHumanJoint = true;
                if (parent) parent.add(joint);
                return joint;
            }
            function makeRing(name, r, parent, pos) {
                const ring = new THREE.Mesh(
                    new THREE.TorusGeometry(r, r * 0.35, 8, 16),
                    jointMat
                );
                ring.name = name;
                ring.userData.isHumanPart = true;
                if (pos) ring.position.set(pos.x || 0, pos.y || 0, pos.z || 0);
                ring.rotation.y = Math.PI / 2;
                if (parent) parent.add(ring);
                return ring;
            }

            // === 躯干（蓝色圆柱体，r124 无 CapsuleGeometry）===
            const torso = makePart('躯干', new THREE.CylinderGeometry(0.18, 0.18, 0.6, 12), bodyMat, {y: 0.6}, human);

            // === 头部（白色球体 + 面部特征）===
            const head = makePart('头部', new THREE.SphereGeometry(0.16, 16, 16), headMat, {y: 0.55}, torso);
            const eyeGeo = new THREE.SphereGeometry(0.02, 8, 8);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.05, 0.02, 0.14);
            head.add(eyeL);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.05, 0.02, 0.14);
            head.add(eyeR);
            const mouthGeo = new THREE.BoxGeometry(0.05, 0.01, 0.01);
            const mouthMat = new THREE.MeshBasicMaterial({ color: 0x555555 });
            const mouth = new THREE.Mesh(mouthGeo, mouthMat);
            mouth.position.set(0, -0.04, 0.14);
            head.add(mouth);

            // === 左臂 ===
            const shoulderL = makeJoint('左肩', {x: -0.22, y: 0.22}, torso);
            makeRing('左肩环', 0.065, shoulderL);
            const upperArmL = makePart('左上臂', new THREE.CylinderGeometry(0.045, 0.04, 0.35, 8), bodyMat, {y: -0.175}, shoulderL);
            const elbowL = makeJoint('左肘', {y: -0.175}, upperArmL);
            makeRing('左肘环', 0.055, elbowL);
            const lowerArmL = makePart('左下臂', new THREE.CylinderGeometry(0.04, 0.035, 0.32, 8), bodyMat, {y: -0.16}, elbowL);
            // 左手（方块状）
            const handL = makePart('左手', new THREE.BoxGeometry(0.06, 0.07, 0.06), bodyMat, {y: -0.2}, lowerArmL);

            // === 右臂 ===
            const shoulderR = makeJoint('右肩', {x: 0.22, y: 0.22}, torso);
            makeRing('右肩环', 0.065, shoulderR);
            const upperArmR = makePart('右上臂', new THREE.CylinderGeometry(0.045, 0.04, 0.35, 8), bodyMat, {y: -0.175}, shoulderR);
            const elbowR = makeJoint('右肘', {y: -0.175}, upperArmR);
            makeRing('右肘环', 0.055, elbowR);
            const lowerArmR = makePart('右下臂', new THREE.CylinderGeometry(0.04, 0.035, 0.32, 8), bodyMat, {y: -0.16}, elbowR);
            // 右手（方块状）
            const handR = makePart('右手', new THREE.BoxGeometry(0.06, 0.07, 0.06), bodyMat, {y: -0.2}, lowerArmR);

            // === 左腿 ===
            const hipL = makeJoint('左髋', {x: -0.1, y: -0.38}, torso);
            makeRing('左髋环', 0.07, hipL);
            const upperLegL = makePart('左大腿', new THREE.CylinderGeometry(0.055, 0.045, 0.42, 8), bodyMat, {y: -0.21}, hipL);
            const kneeL = makeJoint('左膝', {y: -0.21}, upperLegL);
            makeRing('左膝环', 0.06, kneeL);
            const lowerLegL = makePart('左小腿', new THREE.CylinderGeometry(0.045, 0.04, 0.4, 8), bodyMat, {y: -0.2}, kneeL);
            // 左脚
            const footL = makePart('左脚', new THREE.BoxGeometry(0.08, 0.04, 0.12), bodyMat, {y: -0.22, z: 0.02}, lowerLegL);

            // === 右腿 ===
            const hipR = makeJoint('右髋', {x: 0.1, y: -0.38}, torso);
            makeRing('右髋环', 0.07, hipR);
            const upperLegR = makePart('右大腿', new THREE.CylinderGeometry(0.055, 0.045, 0.42, 8), bodyMat, {y: -0.21}, hipR);
            const kneeR = makeJoint('右膝', {y: -0.21}, upperLegR);
            makeRing('右膝环', 0.06, kneeR);
            const lowerLegR = makePart('右小腿', new THREE.CylinderGeometry(0.045, 0.04, 0.4, 8), bodyMat, {y: -0.2}, kneeR);
            // 右脚
            const footR = makePart('右脚', new THREE.BoxGeometry(0.08, 0.04, 0.12), bodyMat, {y: -0.22, z: 0.02}, lowerLegR);

            mesh = human;
            mesh.name = '人物_' + (objects.length + 1);
            mesh.userData.isHuman = true;
            mesh.userData.humanRoot = true;
            break;
        }
        case 'prop': {
            // 道具占位：随机形状
            const shapes = ['cube', 'sphere'];
            const st = shapes[Math.floor(Math.random() * shapes.length)];
            if (st === 'cube') {
                const geo = new THREE.BoxGeometry(0.4, 0.4, 0.6);
                const mat = new THREE.MeshStandardMaterial({ color:0xffeaa7, roughness:0.7 });
                mesh = new THREE.Mesh(geo, mat);
            } else {
                const geo = new THREE.SphereGeometry(0.25, 16, 16);
                const mat = new THREE.MeshStandardMaterial({ color:0xfd79a8, roughness:0.5, metalness:0.5 });
                mesh = new THREE.Mesh(geo, mat);
            }
            mesh.name = '道具_' + (objects.length + 1);
            break;
        }
        case 'camera': {
            // 相机可视化：参考 Blender 线框视锥体风格
            const group = new THREE.Group();

            // ===== 线框视锥体（黄色线框 = 视野）=====
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffcc00, linewidth: 1 });

            // 视锥体尺寸（远端矩形 = 成像平面）
            const vw = 0.5, vh = 0.35, vd = 1.2;
            const verts = new Float32Array([
                // 远端矩形框（成像平面）
                -vw,  vh, -vd,   vw,  vh, -vd,  // 上边
                 vw,  vh, -vd,   vw, -vh, -vd,  // 右边
                 vw, -vh, -vd,  -vw, -vh, -vd,  // 下边
                -vw, -vh, -vd,  -vw,  vh, -vd,  // 左边
                // 斜线：相机位置 → 远端4个角
                0, 0, 0,       -vw,  vh, -vd,
                0, 0, 0,        vw,  vh, -vd,
                0, 0, 0,        vw, -vh, -vd,
                0, 0, 0,       -vw, -vh, -vd,
            ]);

            const frustumGeo = new THREE.BufferGeometry();
            frustumGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
            const frustum = new THREE.LineSegments(frustumGeo, lineMat);
            group.add(frustum);

            // ===== 相机机身（黑色小矩形，像 Blender 那样）=====
            const bodyGeo = new THREE.PlaneGeometry(0.16, 0.12);
            const bodyMat = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.z = -0.02;
            group.add(body);

            // ===== 前方指示箭头（小三角）=====
            const arrowVerts = new Float32Array([
                0, 0, -0.12,    -0.04, 0, -0.18,
                0, 0, -0.12,     0.04, 0, -0.18,
                0, 0, -0.12,     0, 0.04, -0.18,
                0, 0, -0.12,     0, -0.04, -0.18,
            ]);
            const arrowGeo = new THREE.BufferGeometry();
            arrowGeo.setAttribute('position', new THREE.BufferAttribute(arrowVerts, 3));
            const arrow = new THREE.LineSegments(arrowGeo, lineMat);
            group.add(arrow);

            mesh = group;
            mesh.name = '相机_' + (cameraObjects.length + 1);
            // 存储相机参数
            mesh.userData = {
                type: 'camera',
                isCameraObj: true,
                fov: 50,
                near: 0.1,
                far: 1000,
                focalLength: 35  // mm
            };
            cameraObjects.push(mesh);
            break;
        }
    }

    mesh.castShadow = true;
    mesh.position.y = type === 'plane' ? 0 : 0.5;
    // 保留 case 里已设置的 userData（如相机的 isCameraObj），只补充 type 和 id
    mesh.userData = { ...mesh.userData, type, id: Date.now() };
    scene.add(mesh);
    // 相机对象只加入 cameraObjects，不加入 objects（避免重复）
    if (type !== 'camera') {
        objects.push(mesh);
    }
    updateObjectTree();
    selectObject(mesh);
    // 关闭添加菜单，防止重复添加
    document.getElementById('add-menu').classList.remove('show');
    showToast('已添加: ' + mesh.name);
}

function selectObject(obj) {
    // TransformControls：先 detach 旧对象
    if (transformControl) transformControl.detach();

    // 清除旧选中高亮（支持 Group 和 Mesh）
    if (selectedObj) {
        clearHighlight(selectedObj);
    }
    selectedObj = obj;

    // TransformControls：attach 新对象（所有对象都支持）
    if (transformControl && obj) {
        transformControl.attach(obj);
    }

    // 设置新选中高亮（支持 Group 和 Mesh）
    if (obj) {
        setHighlight(obj, 0x333300);
    }
    updatePropsPanel();
    updateObjectTree();
    // 选中相机时更新锁定按钮状态
    if (obj && obj.userData && obj.userData.isCameraObj) {
        updateLockButtonUI();
    }
}

// 高亮辅助函数：支持 Group（遍历子 Mesh）和 Mesh
function setHighlight(obj, color) {
    if (obj.isMesh && obj.material && obj.material.emissive) {
        if (obj.userData.oldEmissive === undefined) obj.userData.oldEmissive = obj.material.emissive.getHex();
        obj.material.emissive.setHex(color);
    }
    if (obj.isGroup) {
        obj.traverse(child => {
            if (child.isMesh && child.material && child.material.emissive) {
                if (child.userData.oldEmissive === undefined) child.userData.oldEmissive = child.material.emissive.getHex();
                child.material.emissive.setHex(color);
            }
        });
    }
}

function clearHighlight(obj) {
    if (obj.isMesh && obj.material && obj.material.emissive) {
        obj.material.emissive.setHex(obj.userData.oldEmissive || 0);
    }
    if (obj.isGroup) {
        obj.traverse(child => {
            if (child.isMesh && child.material && child.material.emissive) {
                child.material.emissive.setHex(child.userData.oldEmissive || 0);
            }
        });
    }
}

function deleteSelected() {
    if (!selectedObj) return;
    let target = selectedObj;

    // 如果选中的是人形子部位，找到人形总组进行删除
    if (selectedObj.userData && (selectedObj.userData.isHumanPart || selectedObj.userData.isHumanJoint || selectedObj.userData.isHuman)) {
        let node = selectedObj;
        while (node && !(node.userData && node.userData.isHuman)) {
            node = node.parent;
        }
        if (node) target = node;
    }

    // 如果选中的是聚光 target 点，删除父灯光
    if (selectedObj.userData && selectedObj.userData.isSpotLightTarget) {
        target = selectedObj.userData.parentLight;
    }

    scene.remove(target);
    objects = objects.filter(o => o !== target);
    // 如果是相机对象，也从 cameraObjects 中移除
    if (target.userData && target.userData.isCameraObj) {
        cameraObjects = cameraObjects.filter(c => c !== target);
        // 如果删除的是锁定相机，解锁视图
        if (lockedCamera === target) {
            unlockCameraFromView();
        }
    }
    if (transformControl) transformControl.detach();
    selectedObj = null;
    updateObjectTree();
    updatePropsPanel();
    showToast('已删除: ' + (target.name || '对象'));
}

function clearScene() {
    if (!confirm('确定清空所有对象？')) return;
    // 移除普通对象
    objects.forEach(o => {
        if (o.parent) o.parent.remove(o);
        else scene.remove(o);
    });
    // 移除相机对象
    cameraObjects.forEach(c => {
        if (c.parent) c.parent.remove(c);
        else scene.remove(c);
    });
    objects = [];
    cameraObjects = [];
    selectedObj = null;
    // 重置背景为默认颜色
    scene.background = new THREE.Color(0x050508);
    // 清空时解锁视图
    if (lockedCamera) unlockCameraFromView();
    updateObjectTree();
    updatePropsPanel();
    showToast('场景已清空');
}

// ============ 对象树 UI ============
function updateObjectTree() {
    const tree = document.getElementById('object-tree');
    const allObjects = [...objects, ...cameraObjects];

    // 获取一个节点的树子节点列表（人形部位 + 聚光target点）
    function getTreeChildren(obj) {
        if (!obj.children) return [];
        const result = [];
        // 直接子节点
        obj.children.forEach(child => {
            if (!child.userData) return;
            if (child.userData.isHumanPart || child.userData.isHumanJoint || child.userData.isHuman) {
                result.push(child);
            }
            // 聚光辅助线框中的 target 点（孙节点）
            if (child.name === 'SpotLightGizmo' && child.children) {
                child.children.forEach(grandchild => {
                    if (grandchild.userData && grandchild.userData.isSpotLightTarget) {
                        result.push(grandchild);
                    }
                });
            }
        });
        return result;
    }

    function renderNode(obj, depth) {
        const isSel = selectedObj === obj;
        const indent = depth * 14;
        let icon;
        if (obj.userData && obj.userData.isSpotLightTarget) {
            icon = '🎯';
        } else if (obj.userData && obj.userData.isHumanPart) {
            icon = '🦴';
        } else if (obj.userData && obj.userData.isHumanJoint) {
            icon = '⚙️';
        } else {
            icon = getObjIcon(obj.userData && obj.userData.type ? obj.userData.type : 'prop');
        }
        const name = obj.name || '未命名';
        const children = getTreeChildren(obj);
        const hasChildren = children.length > 0;
        const isExpanded = treeExpandedState[obj.uuid] !== false; // 默认展开

        let html = '';

        // 节点行（带展开箭头和点击事件）
        html += `<div class="tree-item ${isSel ? 'selected' : ''}" style="padding-left:${12 + indent}px;" onclick="onTreeClick(event, '${obj.uuid}')">`;
        if (hasChildren) {
            const arrowCls = isExpanded ? '' : 'collapsed';
            html += `<button class="tree-expand ${arrowCls}" onclick="event.stopPropagation(); toggleTreeExpand('${obj.uuid}')">▼</button>`;
        } else {
            html += `<span style="width:16px;flex-shrink:0;"></span>`;
        }
        html += `<span class="tree-icon">${icon}</span><span>${name}</span></div>`;

        // 子节点容器（可折叠）
        if (hasChildren && isExpanded) {
            children.forEach(child => {
                html += renderNode(child, depth + 1);
            });
        }

        return html;
    }

    let html = '';
    allObjects.forEach(obj => {
        html += renderNode(obj, 0);
    });
    tree.innerHTML = html || '<div style="padding:12px 8px;font-size:11px;color:var(--muted);text-align:center;">点击 ＋ 添加对象</div>';
    document.getElementById('obj-badge').textContent = allObjects.length + ' 对象';
}

function toggleTreeExpand(uuid) {
    treeExpandedState[uuid] = treeExpandedState[uuid] === false;
    updateObjectTree();
}

function getObjIcon(type) {
    const icons = { cube:'⬜', sphere:'⚪', cylinder:'🔵', plane:'▬', light:'💡', character:'🧑', prop:'📦', camera:'📷' };
    return icons[type] || '📦';
}

function onTreeClick(e, uuid) {
    // 先在顶层对象中查找
    const allObjects = [...objects, ...cameraObjects];
    let obj = allObjects.find(o => o.uuid === uuid);
    // 如果找不到，在场景所有人形中递归查找子部位
    if (!obj) {
        function findInNode(node) {
            if (node.uuid === uuid) return node;
            for (const child of node.children) {
                const found = findInNode(child);
                if (found) return found;
            }
            return null;
        }
        for (const root of allObjects) {
            obj = findInNode(root);
            if (obj) break;
        }
    }
    if (obj) selectObject(obj);
}

// ============ 属性面板 ============
function updatePropsPanel() {
    const overlay = document.getElementById('props-overlay');
    const defaultPanel = document.getElementById('props-default');
    const cameraPanel = document.getElementById('props-camera-panel');
    const lightPanel = document.getElementById('props-light-panel');
    const transformGroup = document.getElementById('transform-group');

    // 全部隐藏
    overlay.style.display = 'none';
    defaultPanel.style.display = 'none';
    cameraPanel.style.display = 'none';
    lightPanel.style.display = 'none';

    if (!selectedObj) {
        overlay.style.display = 'block';
        defaultPanel.style.display = 'block';
        transformGroup.style.display = 'none';
        return;
    }

    // 相机对象
    if (selectedObj.userData && selectedObj.userData.isCameraObj) {
        defaultPanel.style.display = 'block';
        transformGroup.style.display = 'none';
        cameraPanel.style.display = 'block';
        renderCameraProps(selectedObj);
        return;
    }

    // 灯光对象
    if (selectedObj.userData && selectedObj.userData.type === 'light') {
        defaultPanel.style.display = 'block';
        transformGroup.style.display = 'none';
        lightPanel.style.display = 'block';
        renderLightProps(selectedObj);
        return;
    }

    // 普通对象：显示默认面板 + 变换属性
    defaultPanel.style.display = 'block';
    transformGroup.style.display = 'block';
    const p = selectedObj.position;
    document.getElementById('inp-px').value = p.x.toFixed(2);
    document.getElementById('inp-py').value = p.y.toFixed(2);
    document.getElementById('inp-pz').value = p.z.toFixed(2);

    // 聚光 target 点只显示位置，隐藏旋转/缩放/颜色
    const isTarget = selectedObj.userData && selectedObj.userData.isSpotLightTarget;
    const rotRows = document.getElementById('rot-rows');
    const scaleRows = document.getElementById('scale-rows');
    const colorRow = document.getElementById('mesh-color-row');
    if (rotRows) rotRows.style.display = isTarget ? 'none' : 'block';
    if (scaleRows) scaleRows.style.display = isTarget ? 'none' : 'block';
    if (colorRow) colorRow.style.display = isTarget ? 'none' : 'flex';

    if (!isTarget) {
        const r = selectedObj.rotation;
        const s = selectedObj.scale;
        document.getElementById('inp-rx').value = THREE.MathUtils.radToDeg(r.x).toFixed(0);
        document.getElementById('inp-ry').value = THREE.MathUtils.radToDeg(r.y).toFixed(0);
        document.getElementById('inp-rz').value = THREE.MathUtils.radToDeg(r.z).toFixed(0);
        document.getElementById('inp-sx').value = s.x.toFixed(2);
        document.getElementById('inp-sy').value = s.y.toFixed(2);
        document.getElementById('inp-sz').value = s.z.toFixed(2);
        // 读取当前颜色
        const colorHex = getMeshColor(selectedObj);
        if (colorHex) document.getElementById('mesh-color').value = colorHex;
    }
}

function renderCameraProps(camObj) {
    const d = camObj.userData;
    document.getElementById('cam-fov').value = d.fov;
    document.getElementById('cam-near').value = d.near;
    document.getElementById('cam-far').value = d.far;
    document.getElementById('cam-focal').value = d.focalLength;
    document.getElementById('cam-px').value = camObj.position.x.toFixed(2);
    document.getElementById('cam-py').value = camObj.position.y.toFixed(2);
    document.getElementById('cam-pz').value = camObj.position.z.toFixed(2);
    document.getElementById('cam-ry').value = THREE.MathUtils.radToDeg(camObj.rotation.y).toFixed(0);
}

function syncCameraPropsToPanel(camObj) {
    // 从对象同步到面板输入值（拖动 Gizmo 时调用）
    const d = camObj.userData;
    const fovEl = document.getElementById('cam-fov');
    if (fovEl) {
        document.getElementById('cam-fov').value = d.fov;
        document.getElementById('cam-near').value = d.near;
        document.getElementById('cam-far').value = d.far;
        document.getElementById('cam-focal').value = d.focalLength;
        document.getElementById('cam-px').value = camObj.position.x.toFixed(2);
        document.getElementById('cam-py').value = camObj.position.y.toFixed(2);
        document.getElementById('cam-pz').value = camObj.position.z.toFixed(2);
        document.getElementById('cam-ry').value = THREE.MathUtils.radToDeg(camObj.rotation.y).toFixed(0);
    }
}

function applyCameraProps() {
    if (!selectedObj || !selectedObj.userData.isCameraObj) return;
    const d = selectedObj.userData;
    d.fov = parseFloat(document.getElementById('cam-fov').value) || 50;
    d.near = parseFloat(document.getElementById('cam-near').value) || 0.1;
    d.far = parseFloat(document.getElementById('cam-far').value) || 1000;
    d.focalLength = parseFloat(document.getElementById('cam-focal').value) || 35;
    showToast('相机参数已更新（预览生效需设为当前相机）');
}

function applyCameraTransform() {
    if (!selectedObj || !selectedObj.userData.isCameraObj) return;
    const px = parseFloat(document.getElementById('cam-px').value) || 0;
    const py = parseFloat(document.getElementById('cam-py').value) || 0;
    const pz = parseFloat(document.getElementById('cam-pz').value) || 0;
    const ry = THREE.MathUtils.degToRad(parseFloat(document.getElementById('cam-ry').value) || 0);
    selectedObj.position.set(px, py, pz);
    selectedObj.rotation.set(0, ry, 0);
}

// ============ 灯光对象控制 ============
function renderLightProps(lightObj) {
    const light = lightObj.userData.lightSource;
    if (!light) return;
    const type = lightObj.userData.lightType || 'point';
    document.getElementById('light-type').value = type;
    document.getElementById('light-intensity').value = light.intensity.toFixed(1);
    document.getElementById('light-color-obj').value = '#' + light.color.getHexString();
    document.getElementById('light-px').value = lightObj.position.x.toFixed(2);
    document.getElementById('light-py').value = lightObj.position.y.toFixed(2);
    document.getElementById('light-pz').value = lightObj.position.z.toFixed(2);

    // 根据类型显示/隐藏不同参数
    const isPoint = type === 'point';
    const isSpot = type === 'spot';
    document.getElementById('light-distance-row').style.display = isPoint || isSpot ? 'flex' : 'none';
    document.getElementById('light-decay-row').style.display = isPoint || isSpot ? 'flex' : 'none';
    document.getElementById('light-angle-row').style.display = isSpot ? 'flex' : 'none';
    document.getElementById('light-penumbra-row').style.display = isSpot ? 'flex' : 'none';

    if (isPoint || isSpot) {
        document.getElementById('light-distance').value = light.distance.toFixed(1);
        document.getElementById('light-decay').value = light.decay.toFixed(1);
    }
    if (isSpot) {
        document.getElementById('light-angle').value = THREE.MathUtils.radToDeg(light.angle).toFixed(0);
        document.getElementById('light-angle-val').textContent = THREE.MathUtils.radToDeg(light.angle).toFixed(0) + '°';
        document.getElementById('light-penumbra').value = Math.round(light.penumbra * 100);
        document.getElementById('light-penumbra-val').textContent = light.penumbra.toFixed(2);
    }
}

function applyLightProps() {
    if (!selectedObj || selectedObj.userData.type !== 'light') return;
    const newType = document.getElementById('light-type').value;
    const oldType = selectedObj.userData.lightType || 'point';
    const intensity = parseFloat(document.getElementById('light-intensity').value) || 0;
    const color = document.getElementById('light-color-obj').value;

    // 如果类型变了，重建光源对象
    if (newType !== oldType || !selectedObj.userData.lightSource) {
        // 移除旧光源
        const oldLight = selectedObj.userData.lightSource;
        if (oldLight) {
            selectedObj.remove(oldLight);
            if (oldLight.dispose) oldLight.dispose();
        }
        // 创建新光源
        let newLight;
        if (newType === 'directional') {
            newLight = new THREE.DirectionalLight(color, intensity);
            newLight.castShadow = true;
            newLight.shadow.mapSize.set(2048, 2048);
        } else if (newType === 'spot') {
            const dist = parseFloat(document.getElementById('light-distance').value) || 10;
            const decay = parseFloat(document.getElementById('light-decay').value) || 2;
            const angle = THREE.MathUtils.degToRad(parseFloat(document.getElementById('light-angle').value) || 45);
            const penumbra = parseFloat(document.getElementById('light-penumbra').value) / 100 || 0;
            newLight = new THREE.SpotLight(color, intensity, dist, angle, penumbra, decay);
            newLight.castShadow = true;
            newLight.shadow.mapSize.set(2048, 2048);
            newLight.shadow.bias = -0.0005;
        } else {
            const dist = parseFloat(document.getElementById('light-distance').value) || 10;
            const decay = parseFloat(document.getElementById('light-decay').value) || 2;
            newLight = new THREE.PointLight(color, intensity, dist, decay);
            newLight.castShadow = true;
        }
        selectedObj.add(newLight);
        selectedObj.userData.lightSource = newLight;
        selectedObj.userData.lightType = newType;
        // 聚光类型时创建辅助线框，其他类型时移除
        if (newType === 'spot') {
            createSpotLightGizmo(selectedObj);
        } else {
            if (selectedObj.userData.spotGizmo) {
                selectedObj.remove(selectedObj.userData.spotGizmo);
                selectedObj.userData.spotGizmo = null;
            }
        }
        // 更新名称
        const typeNames = { point: '点光', directional: '日光', spot: '聚光' };
        const baseName = selectedObj.name.replace(/_.*$/, '') || '灯光';
        selectedObj.name = baseName + '_' + typeNames[newType];
        showToast('已切换为: ' + typeNames[newType]);
    } else {
        // 类型没变，只更新参数
        const light = selectedObj.userData.lightSource;
        light.intensity = intensity;
        light.color.set(color);
        if (newType === 'point' || newType === 'spot') {
            light.distance = parseFloat(document.getElementById('light-distance').value) || 10;
            light.decay = parseFloat(document.getElementById('light-decay').value) || 2;
        }
        if (newType === 'spot') {
            light.angle = THREE.MathUtils.degToRad(parseFloat(document.getElementById('light-angle').value) || 45);
            light.penumbra = parseFloat(document.getElementById('light-penumbra').value) / 100 || 0;
            // 参数变了，重建辅助线框
            createSpotLightGizmo(selectedObj);
        }
    }

    if (newType === 'spot') {
        document.getElementById('light-angle-val').textContent = document.getElementById('light-angle').value + '°';
        document.getElementById('light-penumbra-val').textContent = (parseFloat(document.getElementById('light-penumbra').value) / 100).toFixed(2);
    }
}

// ============ 聚光辅助线框（Blender风格）============
function createSpotLightGizmo(lightObj) {
    // 移除旧的（如果当前正在拖动target点，先detach）
    let oldTargetWorldPos = null;
    if (lightObj.userData.spotGizmo) {
        const oldTarget = lightObj.userData.spotGizmo.getObjectByName('SpotLightTarget');
        if (oldTarget) {
            // 记录旧target的世界位置，重建后恢复
            oldTargetWorldPos = new THREE.Vector3();
            oldTarget.getWorldPosition(oldTargetWorldPos);
            if (selectedObj === oldTarget && transformControl) {
                transformControl.detach();
            }
        }
        lightObj.remove(lightObj.userData.spotGizmo);
        lightObj.userData.spotGizmo = null;
    }
    const light = lightObj.userData.lightSource;
    if (!light || !(light instanceof THREE.SpotLight)) return;

    const gizmo = new THREE.Group();
    gizmo.name = 'SpotLightGizmo';
    const orange = 0xffaa44;
    const yellow = 0xffdd33;

    // 1. 锥形线框：12条斜线（光源→底部圆环），保证视觉完整
    const dist = light.distance || 10;
    const angle = light.angle || Math.PI / 4;
    const radius = Math.tan(angle) * dist;

    const coneVerts = [];
    const lineSegs = 12;
    for (let i = 0; i < lineSegs; i++) {
        const a = (i / lineSegs) * Math.PI * 2;
        coneVerts.push(0, 0, 0, Math.cos(a) * radius, -dist, Math.sin(a) * radius);
    }
    const coneGeo = new THREE.BufferGeometry();
    coneGeo.setAttribute('position', new THREE.Float32BufferAttribute(coneVerts, 3));
    const coneLines = new THREE.LineSegments(coneGeo, new THREE.LineBasicMaterial({ color: orange }));
    gizmo.add(coneLines);

    // 2. 底部双圆环：内圆=硬边缘，外圆=软边缘（penumbra）
    const penumbra = light.penumbra || 0;
    const innerR = radius;
    const outerR = radius * (1 + penumbra * 0.5);

    function makeRingGeo(r, segs) {
        const v = [];
        for (let i = 0; i < segs; i++) {
            const a1 = (i / segs) * Math.PI * 2;
            const a2 = ((i + 1) / segs) * Math.PI * 2;
            v.push(Math.cos(a1) * r, -dist, Math.sin(a1) * r);
            v.push(Math.cos(a2) * r, -dist, Math.sin(a2) * r);
        }
        const g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
        return g;
    }

    const innerRing = new THREE.LineSegments(makeRingGeo(innerR, 32), new THREE.LineBasicMaterial({ color: orange }));
    const outerRing = new THREE.LineSegments(makeRingGeo(outerR, 32), new THREE.LineBasicMaterial({ color: orange, transparent: true, opacity: 0.4 }));
    gizmo.add(innerRing);
    gizmo.add(outerRing);

    // 3. 中心黄点（target）—— 可拖拽控制光朝向
    const targetGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const targetMat = new THREE.MeshBasicMaterial({ color: yellow });
    const targetDot = new THREE.Mesh(targetGeo, targetMat);
    targetDot.name = 'SpotLightTarget';
    targetDot.userData.isSpotLightTarget = true;
    targetDot.userData.parentLight = lightObj;
    targetDot.castShadow = false;
    targetDot.receiveShadow = false;
    // 如果有旧target位置，恢复它；否则使用默认位置
    if (oldTargetWorldPos) {
        const localPos = lightObj.worldToLocal(oldTargetWorldPos.clone());
        targetDot.position.copy(localPos);
    } else {
        targetDot.position.set(0, -dist, 0);
    }
    gizmo.add(targetDot);
    // 绑定 SpotLight.target 到黄点，这样拖动黄点时光方向自动更新
    light.target = targetDot;

    // 4. target 到光源的连线（终点跟随 targetDot）
    const tp = targetDot.position;
    const lineGeo = new THREE.BufferGeometry();
    lineGeo.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0, tp.x,tp.y,tp.z], 3));
    const targetLine = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: yellow, transparent: true, opacity: 0.6 }));
    targetLine.name = 'SpotLightTargetLine';
    gizmo.add(targetLine);

    lightObj.add(gizmo);
    lightObj.userData.spotGizmo = gizmo;
}

function updateSpotLightGizmo(lightObj) {
    // 完全重建（参数变了锥形尺寸会变）
    createSpotLightGizmo(lightObj);
}

function applyLightTransform() {

// ============ 普通物体颜色控制 ============
function getMeshColor(obj) {
    // 递归查找第一个 Mesh，返回其材质颜色的 hex 字符串
    let target = obj;
    if (target.material && target.material.color) {
        return '#' + target.material.color.getHexString();
    }
    if (target.children) {
        for (let i = 0; i < target.children.length; i++) {
            const c = getMeshColor(target.children[i]);
            if (c) return c;
        }
    }
    return null;
}

function applyMeshColor() {
    if (!selectedObj) return;
    const hex = document.getElementById('mesh-color').value;
    const color = new THREE.Color(hex);
    // 遍历所有 Mesh 子对象，修改材质颜色（排除眼睛/嘴巴等基本材质）
    selectedObj.traverse(child => {
        if (child.isMesh && child.material && child.material.color) {
            // 跳过眼睛、嘴巴等面部特征（MeshBasicMaterial 且尺寸极小）
            if (child.material.type === 'MeshBasicMaterial' && child.geometry) {
                const geo = child.geometry;
                if (geo.parameters && (geo.parameters.radius < 0.03 || geo.parameters.width < 0.03)) return;
            }
            child.material.color.set(color);
        }
    });
}

function snapToCamera(uuid) {
    // 将视口相机切换到该相机对象的角度和位置
    const camObj = objects.find(o => o.uuid === uuid) || cameraObjects.find(o => o.uuid === uuid);
    if (!camObj) return;

    // 隐藏所有相机可视化对象，避免遮挡画面
    cameraObjects.forEach(c => c.visible = false);
    // 强制重置该相机的 scale（防止之前被意外缩放）
    camObj.scale.set(1, 1, 1);

    const d = camObj.userData;
    // 计算相机参数
    camera.fov = d.fov;
    camera.near = d.near;
    camera.far = d.far;
    camera.updateProjectionMatrix();
    // 将主相机移到该对象的位置和朝向
    const worldPos = new THREE.Vector3();
    camObj.getWorldPosition(worldPos);
    const worldQuat = new THREE.Quaternion();
    camObj.getWorldQuaternion(worldQuat);
    camera.position.copy(worldPos);
    camera.quaternion.copy(worldQuat);
    // 更新 OrbitControls 目标
    const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(worldQuat);
    controls.target.copy(worldPos).add(fwd.multiplyScalar(5));
    controls.update();
    // 自动锁定该相机到视图
    lockCameraToView(camObj);
    showToast('已切换到相机: ' + camObj.name + '（已锁定到视图）');
}

// ============ 锁定相机到视图（Blender Camera to View）============
function lockCameraToView(camObj) {
    lockedCamera = camObj;
    updateLockButtonUI();
    // 立即同步一次当前相机状态
    syncCameraFromView();
}

function unlockCameraFromView() {
    lockedCamera = null;
    updateLockButtonUI();
    // 解锁后恢复所有相机可视化对象显示
    cameraObjects.forEach(c => c.visible = true);
}

function toggleLockCamera() {
    if (!selectedObj || !selectedObj.userData.isCameraObj) return;
    if (lockedCamera === selectedObj) {
        unlockCameraFromView();
        showToast('已解锁视图');
    } else {
        lockCameraToView(selectedObj);
        showToast('已锁定: ' + selectedObj.name + ' — 拖动视图即可移动相机');
    }
}

function updateLockButtonUI() {
    const btn = document.getElementById('btn-lock-cam');
    if (!btn) return;
    const isLocked = lockedCamera && selectedObj && lockedCamera === selectedObj;
    if (isLocked) {
        btn.textContent = '🔓 解锁视图';
        btn.style.background = 'var(--accent)';
        btn.style.color = '#fff';
        btn.style.borderColor = 'var(--accent)';
    } else {
        btn.textContent = '🔒 锁定到视图';
        btn.style.background = 'var(--panel)';
        btn.style.color = 'var(--text)';
        btn.style.borderColor = 'var(--divider)';
    }
}

function syncCameraFromView() {
    if (!lockedCamera) return;
    // 将主相机的变换同步到锁定相机
    lockedCamera.position.copy(camera.position);
    lockedCamera.quaternion.copy(camera.quaternion);
    // 同步 OrbitControls 的 target（相机看向的点）
    const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
    const target = camera.position.clone().add(fwd.multiplyScalar(5));
    // 不需要修改 controls.target，只需要把相机的位置和朝向同步回去即可
}

function updateTransform() {
    if (!selectedObj) return;
    // 断开 Gizmo，避免 objectChange 事件覆盖手动输入的值
    if (transformControl) transformControl.detach();

    const px = parseFloat(document.getElementById('inp-px').value) || 0;
    const py = parseFloat(document.getElementById('inp-py').value) || 0;
    const pz = parseFloat(document.getElementById('inp-pz').value) || 0;
    selectedObj.position.set(px, py, pz);

    // 聚光 target 点只更新位置，不更新旋转/缩放
    const isTarget = selectedObj.userData && selectedObj.userData.isSpotLightTarget;
    if (!isTarget) {
        const rx = THREE.MathUtils.degToRad(parseFloat(document.getElementById('inp-rx').value) || 0);
        const ry = THREE.MathUtils.degToRad(parseFloat(document.getElementById('inp-ry').value) || 0);
        const rz = THREE.MathUtils.degToRad(parseFloat(document.getElementById('inp-rz').value) || 0);
        const sx = parseFloat(document.getElementById('inp-sx').value) || 1;
        const sy = parseFloat(document.getElementById('inp-sy').value) || 1;
        const sz = parseFloat(document.getElementById('inp-sz').value) || 1;
        selectedObj.rotation.set(rx, ry, rz);
        selectedObj.scale.set(sx, sy, sz);
    }

    // 重新 attach Gizmo（所有对象都支持）
    if (transformControl && selectedObj) {
        transformControl.attach(selectedObj);
    }
}

let pipRenderer = null;
let pipCamera = null;

function initPip() {
    const pipCanvas = document.getElementById('pip-canvas');

    pipRenderer = new THREE.WebGLRenderer({ canvas: pipCanvas, antialias:true, alpha:false });
    pipRenderer.setSize(240, 135);

}

function updateCameraPreview() {
    if (!pipRenderer || !pipCamera) return;
    if (cameraObjects.length === 0) {
        document.getElementById('camera-pip').classList.remove('show');

    }
    document.getElementById('camera-pip').classList.add('show');

// ============ 相机控制 ============
function updateFOV(val) {
    camera.fov = parseInt(val);
    camera.updateProjectionMatrix();
    document.getElementById('val-fov').textContent = val + '°';
}

function updateDist(val) {
    // 调整相机到目标的距离
    const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
    const dist = parseFloat(val);
    camera.position.copy(controls.target).addScaledVector(dir, dist);
    controls.update();
    document.getElementById('val-dist').textContent = val;
}

function setView(type) {
    const t = controls.target.clone();
    switch(type) {
        case 'front': camera.position.set(t.x, t.y, t.z + 10); break;
        case 'top': camera.position.set(t.x, t.y + 10, t.z); camera.lookAt(t); break;
        case 'left': camera.position.set(t.x - 10, t.y, t.z); break;
        case 'persp': camera.position.set(t.x + 10, t.y + 8, t.z + 10); break;
    }
    controls.update();
    showToast('视图: ' + { front:'前视图', top:'顶视图', left:'左视图', persp:'透视图' }[type]);
}

function resetCamera() {
    controls.reset();
    // 恢复所有相机可视化对象显示
    cameraObjects.forEach(c => c.visible = true);
    camera.position.set(10, 8, 10);
    controls.target.set(0, 0, 0);
    controls.update();
    // 解锁视图
    if (lockedCamera) {
        unlockCameraFromView();
    }
    showToast('相机已复位');
}

function toggle2D() {
    const btn = document.getElementById('btn-3dmode');
    const is3D = btn.classList.contains('active');
    if (is3D) {
        // 切换到2D（正交相机，俯视图）
        const aspect = camera.aspect;
        const frustumSize = 20;
        camera = new THREE.OrthographicCamera(
            frustumSize * aspect / -2, frustumSize * aspect / 2,
            frustumSize / 2, frustumSize / -2,
            0.1, 1000
        );
        camera.position.set(0, 10, 0);
        camera.lookAt(0, 0, 0);
        camera.up.set(0, 0, -1);
        controls.object = camera;
        controls.update();
        btn.classList.remove('active');
        btn.innerHTML = '<span class="top-icon">📐</span> 2D';
        showToast('已切换到 2D 模式');
    } else {
        // 切换回 3D（透视相机）
        const wrap = document.querySelector('.viewport-wrap');
        camera = new THREE.PerspectiveCamera(50, wrap.clientWidth / wrap.clientHeight, 0.1, 1000);
        camera.position.set(10, 8, 10);
        controls.object = camera;
        controls.update();
        btn.classList.add('active');
        btn.innerHTML = '<span class="top-icon">🎥</span> 3D';
        showToast('已切换到 3D 模式');
    }
}
