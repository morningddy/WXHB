<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>预览诊断测试</title>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body { background:#0a0a0f; color:#e8e8f0; font-family:sans-serif; overflow:hidden; }
#view { position:absolute; top:0; left:0; width:100%; height:100%; }
#log { position:absolute; top:10px; left:10px; z-index:100; background:rgba(0,0,0,0.85); color:#6c5ce7; padding:12px 16px; border-radius:8px; font-size:12px; max-width:400px; white-space:pre-wrap; }
</style>
</head>
<body>
<div id="log">正在初始化...</div>
<canvas id="view"></canvas>
<script src="./three.min.js"></script>
<script>
(function(){
    var logEl = document.getElementById('log');
    function log(msg) { console.log(msg); var t = logEl.textContent; logEl.textContent = t + '\n' + msg; }

    log('① 加载 Three.js');
    if (typeof THREE === 'undefined') { log('❌ THREE 未定义！'); return; }
    log('✓ THREE OK');

    // 场景
    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050508);
    log('② 场景创建 OK');

    // 灯光
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    var dir = new THREE.DirectionalLight(0xfff5e6, 1.0);
    dir.position.set(5, 10, 7);
    scene.add(dir);
    log('③ 灯光 OK');

    // 添加一个方块（在原点）
    var cube = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1, 1),
        new THREE.MeshStandardMaterial({ color: 0x6c5ce7 })
    );
    scene.add(cube);
    log('④ 方块 OK，位置: ' + cube.position.toArray());

    // 主相机（轨道）
    var mainCam = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    mainCam.position.set(5, 5, 5);
    mainCam.lookAt(0, 0, 0);
    log('⑤ 主相机 OK，位置: ' + mainCam.position.toArray());

    // 预览相机（放在 Z 轴方向看原点）
    var previewCam = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    previewCam.position.set(0, 0, 8);
    previewCam.lookAt(0, 0, 0);
    log('⑥ 预览相机 OK，位置: ' + previewCam.position.toArray());

    // 渲染器
    var canvas = document.getElementById('view');
    var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.autoClear = false;
    log('⑦ 渲染器 OK');

    // 渲染：主画面 + 画中画
    function animate() {
        requestAnimationFrame(animate);
        renderer.clear();
        renderer.render(scene, mainCam);

        // 画中画：右下角 320x200
        var pw = 320, ph = 200;
        var px = canvas.clientWidth - pw - 10;
        var py = canvas.clientHeight - ph - 10;
        renderer.setViewport(px, py, pw, ph);
        renderer.setScissor(px, py, pw, ph);
        renderer.setScissorTest(true);
        renderer.render(scene, previewCam);
        renderer.setViewport(0, 0, canvas.clientWidth, canvas.clientHeight);
        renderer.setScissor(0, 0, canvas.clientWidth, canvas.clientHeight);
        renderer.setScissorTest(false);
    }
    animate();
    log('⑧ animate() 已启动');
    log('如果看到右下角有小画面，说明预览逻辑正常！');
})();
</script>
</body>
</html>
